/* ── SVG Sparkline ── */
function Sparkline({ data, color, fill }) {
  const w = 120, h = 40, pad = 2;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x},${y}`;
  }).join(' ');
  const areaClose = `${w - pad},${h} ${pad},${h}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full" style={{height:40}}>
      <defs>
        <linearGradient id={`sg-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`${pts} ${areaClose}`} fill={`url(#sg-${color.replace('#','')})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* ── SVG Bar Chart ── */
const barData = [

  { label: 'Payouts',      v: 44.8, k: '44.8K' },

];
function BarChart() {
  const [hov, setHov] = useState(null);
  const W=440, H=140, bw=52, gap=24, py=24, px=8;
  const maxV = 70;
  return (
    <svg viewBox={`0 0 ${W} ${H+30}`} className="w-full" style={{height:170}}>
      <defs>
        {barData.map((_, i) => (
          <linearGradient key={i} id={`bg${i}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#4F46E5" stopOpacity={1 - i*0.12}/>
            <stop offset="100%" stopColor="#818CF8" stopOpacity={(1-i*0.12)*0.55}/>
          </linearGradient>
        ))}
      </defs>
      {barData.map((b, i) => {
        const x = px + i * (bw + gap);
        const bh = (b.v / maxV) * H;
        const y = py + (H - bh);
        return (
          <g key={i} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)} style={{cursor:'pointer'}}>
            <rect x={x} y={y} width={bw} height={bh} rx="6" fill={`url(#bg${i})`}
                  opacity={hov !== null && hov !== i ? 0.5 : 1}
                  style={{transition:'opacity 0.15s'}}/>
            <text x={x+bw/2} y={y-6} textAnchor="middle" fontSize="11" fill={hov===i?"#4F46E5":"#64748B"} fontWeight="600">{b.k}</text>
            <text x={x+bw/2} y={H+py+14} textAnchor="middle" fontSize="10" fill="#94A3B8">{b.label.split(' ')[0]}</text>

        );

}

/* ── SVG Donut ── */
const cardDist = [
  { label:'Visa',       pct:54, color:'#4F46E5' },
  { label:'Mastercard', pct:30, color:'#818CF8' },
  { label:'Others',     pct:16, color:'#E0E7FF' },
];
function DonutChart() {
  const [hov, setHov] = useState(null);
  const cx=60, cy=60, R=48, r=30;
  let angle = -Math.PI/2;
  const segs = cardDist.map((d,i) => {
    const a = (d.pct/100) * 2*Math.PI;
    const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
    angle += a;
    const x2=cx+R*Math.cos(angle), y2=cy+R*Math.sin(angle);
    const xi1=cx+r*Math.cos(angle-a), yi1=cy+r*Math.sin(angle-a);
    const xi2=cx+r*Math.cos(angle), yi2=cy+r*Math.sin(angle);
    const large = a > Math.PI ? 1 : 0;
    const path = `M${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${r},${r} 0 ${large},0 ${xi1},${yi1} Z`;
    return { ...d, path, i };
  });
  return (
    <svg viewBox="0 0 120 120" className="w-24 h-24 shrink-0">
      {segs.map(s => (
        <path key={s.i} d={s.path} fill={s.color}
              opacity={hov!==null&&hov!==s.i ? 0.5 : 1}
              style={{transition:'opacity 0.15s', cursor:'pointer'}}
              onMouseEnter={()=>setHov(s.i)} onMouseLeave={()=>setHov(null)}/>

      <text x="60" y="70" textAnchor="middle" fontSize="9" fill="#94A3B8">Digital</text>
    </svg>
  );
}
